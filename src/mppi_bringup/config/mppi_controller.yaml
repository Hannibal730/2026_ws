planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 15.0
      minimum_turning_radius: 3.3
      reverse_penalty: 2.1
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      retrospective_penalty: 0.025
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true

controller_server:
  ros__parameters:
    use_sim_time: false

    controller_frequency: 10.0
    odom_topic: /odom/ekf_encoder_imu
    odom_duration: 0.3

    transform_tolerance: 0.3
    costmap_update_timeout: 0.30
    failure_tolerance: 1.5

    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.3

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      time_steps: 40
      model_dt: 0.1
      batch_size: 500
      iteration_count: 1

      open_loop: false
      reset_period: 1.0
      retry_attempt_limit: 1

      vx_std: 0.3
      wz_std: 0.3

      vx_max: 2.0
      vx_min: -0.5
      wz_max: 1.0

      temperature: 0.3
      gamma: 0.015

      visualize: true
      regenerate_noises: true

      motion_model: "Ackermann"
      ackermann:
        plugin: "mppi::AckermannMotionModel"
        min_turning_r: 3.3

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: true # 중요

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]

      ConstraintCritic:
        enabled: true
        cost_weight: 4.0
        cost_power: 1

      GoalCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        threshold_to_consider: 2.0

      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        cost_power: 1
        threshold_to_consider: 1.0
        symmetric_yaw_tolerance: false

      PathAlignCritic:
        enabled: true
        cost_weight: 14.0
        cost_power: 1
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        offset_from_furthest: 5

      PathAngleCritic:
        enabled: true
        cost_weight: 2.0
        cost_power: 1
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.2
        forward_preference: true

      PreferForwardCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        threshold_to_consider: 0.5

      CostCritic:
        enabled: true
        cost_weight: 3.81
        cost_power: 1
        consider_footprint: true #중요
        collision_cost: 1000000.0
        critical_cost: 300.0
        near_goal_distance: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      update_frequency: 10.0
      publish_frequency: 10.0

      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.3

      rolling_window: true
      width: 20
      height: 20
      resolution: 0.1

      footprint: "[[1.15, 0.5], [1.15, -0.5], [-0.35, -0.4], [-0.35, 0.4]]"
      plugins: ["inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.8
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      update_frequency: 2.0
      publish_frequency: 2.0

      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.3

      rolling_window: true
      width: 60
      height: 60
      resolution: 0.1
      track_unknown_space: false

      footprint: "[[1.15, 0.5], [1.15, -0.5], [-0.35, -0.4], [-0.35, 0.4]]"
      plugins: ["inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.8
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

mppi_path_client:
  ros__parameters:
    use_sim_time: false
    action_name: follow_path
    planner_action_name: compute_path_to_pose
    controller_id: FollowPath
    goal_checker_id: goal_checker
    planner_id: GridBased

    path_frame: odom
    goal_topic: /goal_pose
    csv_path_topic: /mppi/csv_path
    active_path_topic: /mppi/active_path
    status_topic: /mppi/status

    csv_file_path: ""
    csv_frame: odom
    auto_send_csv: false
