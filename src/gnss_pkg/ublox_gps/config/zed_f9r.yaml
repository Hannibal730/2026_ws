# Configuration Settings for u-blox ZED-F9R device
ublox_gps_node:
  ros__parameters:
    debug: 1                    # Range 0-4 (0 means no debug statements will print)
    device: /dev/ttyACM1

    # F9R(HPS 1.40 / PROTVER 33.40)은 legacy UBX-CFG-* 메시지를 NACK함.
    # 드라이버의 시작 시 자동설정을 끄고, rate/GNSS/메시지 출력은
    # u-center에서 미리 설정해 플래시(BBR/Flash)에 저장해서 사용.
    config_on_startup: false
    
    frame_id: f9r_link
    rate: 1.0                    # in Hz — F9R(센서퓨전)은 기본 항법 해를 1Hz로
                                 # 둬야 함. 15Hz/10Hz는 CFG-RATE가 NACK됨.
                                 # 고주파 위치가 필요하면 아래 publish.hnr.pvt 사용
    nav_rate: 1
                                
    dynamic_model: automotive
    #사람이 들고 다니는 장치 기준 portable. 차량이면 automotive, 고정 기지국이면 stationary
    
    uart1:
      baudrate: 115200
     
    gnss:
      sbas: true                # Board already has SBAS enabled; matching it
                                # here avoids a cold reset on every launch
      glonass: true
      beidou: true
      gps: true
      qzss: true
      qzss_sig_cfg: 1114112     # 0x110000 = L1C/A + L2C, matches the board's
                                # current setting so no cold reset is triggered
      galileo: true
      imes: false
    
    # TMODE3 Config
    tmode3: 0                   # Survey-In Mode
    sv_in:
      reset: false               # True: disables and re-enables survey-in (resets)
                                # False: Disables survey-in only if TMODE3 is
                                # disabled
      min_dur: 300              # Survey-In Minimum Duration [s]
      acc_lim: 3.0              # Survey-In Accuracy Limit [m]

    inf:
      all: true                   # Whether to display all INF messages in console
    
    publish:
      aid/all: false